name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  build-test-and-db-check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: devops_db
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U devops_user -d devops_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_HOST: localhost
      DB_NAME: devops_db
      DB_USER: devops_user
      DB_PASSWORD: devops_pass

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Run DB connectivity check
        run: |
          python -c "from app import get_db_connection; conn = get_db_connection(); conn.close(); print('Database connection successful')"

      - name: Build Docker image
        run: |
          docker build -t devops-flask-app .
